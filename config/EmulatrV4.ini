;
; Runtime configuration consumed by configLib::IniLoader.  Schema mirrors
; configLib::EmulatorSettings exactly; missing keys keep struct defaults.
;
; Search order when no explicit path is given on the command line:
;   1. ./EmulatrV4.ini
;   2. ./config/EmulatrV4.ini
;   3. <exe-dir>/EmulatrV4.ini
;   4. <exe-dir>/config/EmulatrV4.ini
;
; ============================================================================

[System]
; Target machine identity and capacity.  `model` is the master switch: it
; selects <lower(model)>_platform.json (DS10 -> ds10_platform.json) and the
; default firmware image, and sets the FDM/HWRPB system identity.
; DS10 is a single-socket 21264: cpuCount=1.  Do NOT advertise >1 CPU while
; only one executes -- SRM/GCT can spin waiting for secondaries (boot hang).
model       = ES40
cpuCount    = 1
activeCpus  = 1
memorySize  = 1073741824   ; 1 GiB

[ROM]
;firmwareImage  = firmware/ds10_v7_3.exe
firmwareImage = firmware/es40c_v7_3.exe
; Optional SHA-256 integrity check (empty = skip).
firmwareSha256 =

[Trace]
; Trace mask flags (OR together):
;   TRACE_INSTR    = 0x01
;   TRACE_PIPELINE = 0x02
;   TRACE_REGFILE  = 0x04
;   TRACE_FPRFILE  = 0x08
;   TRACE_EVENT    = 0x10
traceMask    = 0x07
traceFile    = trace/cpu_trace.log
traceLstFile = trace/cpu_trace.lst

[Snapshot]
; Snapshot save/restore is designed in v1 (SPEC_execution_model.md
; section 11) but implementation is post-v1.
enabled      = false
targetCycle  = 0
outputPath   = snapshots/

[Logging]
; spdlog runtime level.  Values: trace, debug, info, warn, err, critical, off.
; Note: SPDLOG_ACTIVE_LEVEL in coreLib/LoggingMacros.h must be set to TRACE
; for runtime levels below WARN to take effect (the compile-time floor sets
; the lowest level that exists in the binary).
defaultLevel = warn

; Per-component overrides may be added as additional keys, e.g.:
;   pipeline = debug
;   srmConsole = info
;   tlb = trace
; Components register themselves via spdlog::get("name").

[SRMConsole]
; OPA0 console TCP server.  PuTTY connects here.
; Default 10023 (unprivileged).  Edit this to move the console port without a
; rebuild.  EMULATR_CONSOLE_PORT env var overrides this at launch if set.
port             = 10023
rxBufferSize     = 4096
defaultTimeoutMs = 30000
echoEnabled      = true

; Auto-launch PuTTY at start.  Useful during development to skip the
; manual "open PuTTY, type connection string" step on every run.
autoLaunchPutty  = false
puttyPath        = putty.exe
; Extra args appended to the PuTTY command line (e.g. session log path).
puttyExtraArgs   =

[Storage]
; Host directory where disk / media image files live.  The platform manifest
; (ds10_platform.json) names each drive's media as a bare FILENAME; that name
; resolves against this directory.  An absolute media value in the manifest is
; used as-is; an empty media value = no media (drive enumerates as "no media
; present").  Leave diskDir empty to resolve filenames against the launch CWD.
; Example: diskDir = D:\EmulatR\disks
diskDir =
