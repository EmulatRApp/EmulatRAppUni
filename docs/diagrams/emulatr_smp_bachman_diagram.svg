<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="own" markerWidth="11" markerHeight="11" refX="9" refY="3.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.2 L0,6.4 Z" fill="#5F6368"/>
    </marker>
    <marker id="ref" markerWidth="11" markerHeight="11" refX="9" refY="3.2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.2 L0,6.4 Z" fill="#E37400"/>
    </marker>
    <marker id="real" markerWidth="13" markerHeight="13" refX="11" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,4 L0,8 Z" fill="#FFFFFF" stroke="#5F6368" stroke-width="1"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="530" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">EmulatR V4 -- SMP Architecture</text>
  <text x="530" y="50" text-anchor="middle" font-size="12" fill="#5F6368">Bachman-style data-structure diagram: boxes = object/record types, arrows = ownership sets (owner -&gt; member) with cardinality</text>

  <!-- ================= SPINE: Machine / Dispatcher ================= -->
  <!-- Machine -->
  <rect x="410" y="72" width="220" height="50" rx="6" fill="#E8F0FE" stroke="#1967D2" stroke-width="1.6"/>
  <text x="520" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#174EA6">Machine</text>
  <text x="520" y="113" text-anchor="middle" font-size="10.5" fill="#5F6368">system host (non-movable)</text>

  <!-- Dispatcher -->
  <rect x="410" y="176" width="220" height="50" rx="6" fill="#E8F0FE" stroke="#1967D2" stroke-width="1.6"/>
  <text x="520" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#174EA6">Dispatcher</text>
  <text x="520" y="217" text-anchor="middle" font-size="10.5" fill="#5F6368">owns agents, clock, arbiter</text>

  <!-- Machine -> Dispatcher -->
  <line x1="520" y1="122" x2="520" y2="174" stroke="#5F6368" stroke-width="1.5" marker-end="url(#own)"/>
  <text x="528" y="150" font-size="10.5" fill="#3C4043">owns 1:1</text>

  <!-- ================= Dispatcher-owned row ================= -->
  <!-- IExecutionDriver (interface) -->
  <rect x="70" y="290" width="168" height="46" rx="6" fill="#F1F3F4" stroke="#5F6368" stroke-width="1.4" stroke-dasharray="0"/>
  <text x="154" y="312" text-anchor="middle" font-size="12.5" font-style="italic" font-weight="600" fill="#3C4043">&#171;interface&#187;</text>
  <text x="154" y="328" text-anchor="middle" font-size="12.5" font-style="italic" fill="#3C4043">IExecutionDriver</text>

  <!-- LogicalClock -->
  <rect x="258" y="290" width="138" height="46" rx="6" fill="#E8F0FE" stroke="#1967D2" stroke-width="1.4"/>
  <text x="327" y="312" text-anchor="middle" font-size="12.5" font-weight="600" fill="#174EA6">LogicalClock</text>
  <text x="327" y="328" text-anchor="middle" font-size="9.5" fill="#5F6368">system timebase (cycle-unit)</text>

  <!-- LockArbiter -->
  <rect x="416" y="290" width="138" height="46" rx="6" fill="#E8F0FE" stroke="#1967D2" stroke-width="1.4"/>
  <text x="485" y="312" text-anchor="middle" font-size="12.5" font-weight="600" fill="#174EA6">LockArbiter</text>
  <text x="485" y="328" text-anchor="middle" font-size="9.5" fill="#5F6368">LDx_L / STx_C interlock</text>

  <!-- IAgent (interface, the 1:N set) -->
  <rect x="588" y="290" width="156" height="46" rx="6" fill="#F1F3F4" stroke="#5F6368" stroke-width="1.8"/>
  <text x="666" y="312" text-anchor="middle" font-size="12.5" font-style="italic" font-weight="600" fill="#3C4043">&#171;interface&#187;</text>
  <text x="666" y="328" text-anchor="middle" font-size="12.5" font-style="italic" fill="#3C4043">IAgent</text>

  <!-- Dispatcher -> owned row -->
  <line x1="470" y1="226" x2="170" y2="288" stroke="#5F6368" stroke-width="1.5" marker-end="url(#own)"/>
  <text x="300" y="258" font-size="10" fill="#3C4043">owns 1:1 (swappable)</text>
  <line x1="500" y1="226" x2="330" y2="288" stroke="#5F6368" stroke-width="1.5" marker-end="url(#own)"/>
  <line x1="520" y1="226" x2="488" y2="288" stroke="#5F6368" stroke-width="1.5" marker-end="url(#own)"/>
  <text x="430" y="270" font-size="10" fill="#3C4043">owns 1:1</text>
  <line x1="560" y1="226" x2="660" y2="288" stroke="#5F6368" stroke-width="2.2" marker-end="url(#own)"/>
  <text x="612" y="262" font-size="11.5" font-weight="700" fill="#B06000">owns 1:N</text>

  <!-- Driver realizations -->
  <rect x="40" y="372" width="140" height="40" rx="6" fill="#E6F4EA" stroke="#188038" stroke-width="1.4"/>
  <text x="110" y="397" text-anchor="middle" font-size="11.5" fill="#0D652D">SequentialDriver</text>
  <rect x="190" y="372" width="140" height="40" rx="6" fill="#E6F4EA" stroke="#188038" stroke-width="1.4"/>
  <text x="260" y="390" text-anchor="middle" font-size="11.5" fill="#0D652D">ThreadedDriver</text>
  <text x="260" y="404" text-anchor="middle" font-size="9" fill="#5F6368">std::barrier</text>

  <line x1="110" y1="372" x2="140" y2="338" stroke="#5F6368" stroke-width="1.3" marker-end="url(#real)"/>
  <line x1="250" y1="372" x2="178" y2="338" stroke="#5F6368" stroke-width="1.3" marker-end="url(#real)"/>
  <text x="60" y="356" font-size="10" font-style="italic" fill="#5F6368">realizes</text>

  <!-- ================= Agent + CpuState spine ================= -->
  <!-- AlphaCpuAgent -->
  <rect x="566" y="384" width="200" height="50" rx="6" fill="#E6F4EA" stroke="#188038" stroke-width="1.6"/>
  <text x="666" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#0D652D">AlphaCpuAgent</text>
  <text x="666" y="424" text-anchor="middle" font-size="10" fill="#5F6368">re-entrant step(); id() -&gt; cpuSlot</text>

  <line x1="666" y1="384" x2="666" y2="338" stroke="#5F6368" stroke-width="1.3" marker-end="url(#real)"/>
  <text x="672" y="362" font-size="10" font-style="italic" fill="#5F6368">realizes</text>

  <!-- CpuState -->
  <rect x="566" y="490" width="200" height="48" rx="6" fill="#E6F4EA" stroke="#188038" stroke-width="1.6"/>
  <text x="666" y="513" text-anchor="middle" font-size="13" font-weight="700" fill="#0D652D">CpuState</text>
  <text x="666" y="529" text-anchor="middle" font-size="10" fill="#5F6368">per-CPU architectural state</text>

  <line x1="666" y1="434" x2="666" y2="488" stroke="#5F6368" stroke-width="1.7" marker-end="url(#own)"/>
  <text x="674" y="465" font-size="10.5" fill="#3C4043">owns 1:1</text>

  <!-- CpuState fields -->
  <rect x="470" y="592" width="392" height="178" rx="6" fill="#FAFAFA" stroke="#BDC1C6" stroke-width="1.3"/>
  <text x="666" y="612" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3C4043">CpuState members (owned, per-agent)</text>
  <line x1="486" y1="620" x2="846" y2="620" stroke="#E0E0E0" stroke-width="1"/>
  <text x="486" y="638" font-size="10.5" fill="#3C4043">intReg[0..31], fpReg[0..31]</text>
  <text x="486" y="655" font-size="10.5" fill="#3C4043">pc, palBase, scbb, ASN</text>
  <text x="486" y="672" font-size="10.5" fill="#3C4043">cycleCount (PCC, per-CPU)  +ccOffset scaling</text>
  <text x="486" y="689" font-size="10.5" fill="#B06000">cpuSlot (trace / IPI index)  &#8592; STEP 4 set-site</text>
  <text x="486" y="706" font-size="10.5" fill="#3C4043">itbMgr, dtbMgr : SPAMShardManager&lt;16,8&gt;</text>
  <text x="486" y="723" font-size="10.5" fill="#3C4043">reservedCacheLine, hasReservation (LL/SC)</text>
  <text x="486" y="740" font-size="10.5" fill="#3C4043">IER / ISUM, shadow SPs (K/E/S/U), I_CTL</text>
  <text x="486" y="757" font-size="9.5" font-style="italic" fill="#9AA0A6">reservation -&gt; ReservationManager in Phase 3</text>

  <line x1="666" y1="538" x2="666" y2="590" stroke="#5F6368" stroke-width="1.5" marker-end="url(#own)"/>
  <text x="674" y="566" font-size="10.5" fill="#3C4043">contains</text>

  <!-- ================= Shared services (right column) ================= -->
  <rect x="872" y="86" width="160" height="44" rx="6" fill="#FEF7E0" stroke="#E37400" stroke-width="1.6"/>
  <text x="952" y="108" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B06000">GuestMemory</text>
  <text x="952" y="123" text-anchor="middle" font-size="9.5" fill="#9A6400">one instance (shared)</text>

  <rect x="872" y="150" width="160" height="62" rx="6" fill="#FEF7E0" stroke="#E37400" stroke-width="1.6"/>
  <text x="952" y="170" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B06000">TsunamiChipset</text>
  <text x="952" y="185" text-anchor="middle" font-size="9" fill="#9A6400">per-cpuId arrays:</text>
  <text x="952" y="198" text-anchor="middle" font-size="9" fill="#9A6400">dim[], iic[], pendingIrq2/3[]</text>
  <text x="952" y="209" text-anchor="middle" font-size="8.5" font-style="italic" fill="#B58A3C">MISC CPUID inject</text>

  <rect x="872" y="232" width="160" height="44" rx="6" fill="#FEF7E0" stroke="#E37400" stroke-width="1.6"/>
  <text x="952" y="254" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B06000">TraceSink</text>
  <text x="952" y="269" text-anchor="middle" font-size="9.5" fill="#9A6400">single ordered stream</text>

  <!-- Machine -> shared services (owns 1:1) -->
  <line x1="630" y1="88" x2="870" y2="100" stroke="#5F6368" stroke-width="1.4" marker-end="url(#own)"/>
  <line x1="630" y1="98" x2="870" y2="172" stroke="#5F6368" stroke-width="1.4" marker-end="url(#own)"/>
  <line x1="630" y1="108" x2="870" y2="248" stroke="#5F6368" stroke-width="1.4" marker-end="url(#own)"/>
  <text x="700" y="84" font-size="10" fill="#3C4043">owns 1:1 (shared services)</text>

  <!-- AlphaCpuAgent ..references.. shared services (N:1, dashed) -->
  <line x1="766" y1="398" x2="870" y2="258" stroke="#E37400" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#ref)"/>
  <line x1="766" y1="404" x2="870" y2="190" stroke="#E37400" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#ref)"/>
  <line x1="766" y1="410" x2="870" y2="120" stroke="#E37400" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#ref)"/>
  <text x="784" y="350" font-size="10" fill="#B06000">references N:1</text>
  <text x="784" y="364" font-size="9" fill="#B06000">(emits cpuSlot;</text>
  <text x="784" y="376" font-size="9" fill="#B06000">does not own)</text>

  <!-- ================= Legend ================= -->
  <rect x="40" y="448" width="380" height="128" rx="6" fill="#FFFFFF" stroke="#BDC1C6" stroke-width="1.2"/>
  <text x="52" y="468" font-size="11.5" font-weight="700" fill="#202124">Legend</text>

  <line x1="56" y1="486" x2="104" y2="486" stroke="#5F6368" stroke-width="1.6" marker-end="url(#own)"/>
  <text x="112" y="490" font-size="10.5" fill="#3C4043">owns (composition) -- 1:1 or 1:N</text>

  <line x1="56" y1="508" x2="104" y2="508" stroke="#E37400" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#ref)"/>
  <text x="112" y="512" font-size="10.5" fill="#3C4043">references shared service -- N:1</text>

  <line x1="56" y1="530" x2="104" y2="530" stroke="#5F6368" stroke-width="1.4" marker-end="url(#real)"/>
  <text x="112" y="534" font-size="10.5" fill="#3C4043">realizes (interface)</text>

  <rect x="56" y="548" width="14" height="12" rx="2" fill="#E8F0FE" stroke="#1967D2"/>
  <text x="74" y="558" font-size="9.5" fill="#3C4043">system/dispatcher</text>
  <rect x="180" y="548" width="14" height="12" rx="2" fill="#F1F3F4" stroke="#5F6368"/>
  <text x="198" y="558" font-size="9.5" fill="#3C4043">interface</text>
  <rect x="270" y="548" width="14" height="12" rx="2" fill="#E6F4EA" stroke="#188038"/>
  <text x="288" y="558" font-size="9.5" fill="#3C4043">concrete</text>
  <rect x="350" y="548" width="14" height="12" rx="2" fill="#FEF7E0" stroke="#E37400"/>
  <text x="368" y="558" font-size="9.5" fill="#3C4043">shared</text>

  <!-- caption -->
  <text x="40" y="792" font-size="9.5" font-style="italic" fill="#9AA0A6">Determinism boundary: per-CPU state is agent-owned; clock/arbiter/memory/chipset/trace are dispatcher-owned shared services. Execution policy (Sequential vs Threaded) is swappable behind IExecutionDriver.</text>
</svg>
